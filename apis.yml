aid: institute-of-museum-and-library-services
name: Institute of Museum and Library Services
description: >-
  The Institute of Museum and Library Services (IMLS) is an independent federal
  agency that advances, supports, and empowers America's museums, libraries, and
  related organizations through grantmaking, research, and policy development.
  IMLS provides data access to grant and museum information through its APIs.
